name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: false
          body: |
            ## Installation

            **PyPI:**
            ```bash
            pip install icalendar-anonymizer==${{ steps.version.outputs.version }}
            ```

            **Docker:**
            ```bash
            docker pull ghcr.io/pycalendar/icalendar-anonymizer:${{ steps.version.outputs.version }}
            ```

            ## Documentation

            https://docs.icalendar-anonymizer.com/stable/

            ## Changelog

            https://docs.icalendar-anonymizer.com/stable/changelog.html

      - name: Trigger Docker build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docker.yml --ref ${{ github.ref_name }} --repo ${{ github.repository }}
