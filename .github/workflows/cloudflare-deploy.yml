name: Deploy to Cloudflare Workers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for version detection

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.21"
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install workers-py (pywrangler)
        run: uv tool install workers-py

      - name: Sync dependencies with pywrangler
        run: uvx --from workers-py pywrangler sync

      - name: Build package for Workers
        run: bash build.sh

      - name: Clean up build artifacts
        run: |
          # Remove .venv-workers created by pywrangler to prevent upload
          rm -rf .venv-workers
          # Remove other development directories if they exist
          rm -rf .venv node_modules
          # Remove src/ to prevent duplicate uploads (python_modules has the built version)
          rm -rf src
          # Remove other files not needed for deployment
          rm -rf docs .git .github tests *.md build.sh

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy

      - name: Deployment summary
        run: |
          echo "✅ Deployed to Cloudflare Workers"
          echo "🌐 Primary domain: https://icalendar-anonymizer.com"
